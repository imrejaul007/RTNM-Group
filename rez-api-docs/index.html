<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReZ API Documentation</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css">
  <style>
    :root {
      --rez-primary: #6366f1;
      --rez-secondary: #8b5cf6;
      --rez-accent: #10b981;
      --rez-dark: #1e1b4b;
      --rez-light: #f5f3ff;
    }
    html { box-sizing: border-box; overflow: auto; }
    *, *:before, *:after { box-sizing: inherit; }
    body {
      margin: 0;
      padding: 0;
      background: var(--rez-light);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .swagger-ui .topbar { background: linear-gradient(135deg, var(--rez-primary), var(--rez-secondary)); }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
    .swagger-ui .topbar .topbar-wrapper { padding: 10px 20px; }
    .swagger-ui .topbar .topbar-wrapper span { color: white; font-weight: 600; font-size: 18px; }
    .swagger-ui .info .title { color: var(--rez-dark); }
    .swagger-ui .btn.execute { background-color: var(--rez-accent) !important; border-color: var(--rez-accent) !important; }
    .swagger-ui .btn.execute:hover { background-color: #059669 !important; }
    .swagger-ui select { border-color: var(--rez-primary); }
    .swagger-ui .parameter__in { color: var(--rez-primary); }
    .swagger-ui .model-box-control:focus { outline-color: var(--rez-primary); }
    .header-wrapper { background: linear-gradient(135deg, var(--rez-dark) 0%, #312e81 100%); padding: 40px 0; text-align: center; }
    .header-wrapper h1 { color: white; margin: 0; font-size: 32px; font-weight: 700; }
    .header-wrapper p { color: rgba(255,255,255,0.8); margin: 10px 0 0; font-size: 16px; }
    .service-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .service-nav button {
      padding: 8px 16px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      color: #374151;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .service-nav button:hover { background: var(--rez-light); border-color: var(--rez-primary); }
    .service-nav button.active { background: var(--rez-primary); color: white; border-color: var(--rez-primary); }
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 50px; height: 50px;
      border: 4px solid #e5e7eb;
      border-top-color: var(--rez-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      background: var(--rez-dark);
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
    .footer a { color: var(--rez-accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="header-wrapper">
    <h1>ReZ Platform API Documentation</h1>
    <p>Comprehensive API reference for all ReZ microservices</p>
  </div>

  <nav class="service-nav" id="serviceNav">
    <button class="active" data-service="combined">All Services</button>
    <button data-service="rez-delivery-service">Delivery</button>
    <button data-service="rez-analytics-service">Analytics</button>
    <button data-service="rez-payment-links-service">Payment Links</button>
    <button data-service="rez-journey-service">Journey</button>
    <button data-service="rez-automation-service">Automation</button>
    <button data-service="rez-gdpr-service">GDPR</button>
    <button data-service="rez-validation-service">Validation</button>
    <button data-service="rez-cohort-service">Cohort</button>
    <button data-service="rez-currency-service">Currency</button>
    <button data-service="rez-invoice-service">Invoice</button>
    <button data-service="rez-menu-service">Menu</button>
    <button data-service="rez-refund-service">Refund</button>
    <button data-service="rez-tracking-service">Tracking</button>
    <button data-service="rez-marketing">Marketing</button>
    <button data-service="rez-auth-service">Auth</button>
  </nav>

  <div id="swagger-ui"></div>

  <footer class="footer">
    <p>ReZ Platform API Documentation &copy; 2024 | <a href="https://rez.money" target="_blank">rez.money</a></p>
  </footer>

  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
  <script>
    const services = {
      'combined': 'swagger.json',
      'rez-delivery-service': 'rez-delivery-service/openapi.yaml',
      'rez-analytics-service': 'rez-analytics-service/openapi.yaml',
      'rez-payment-links-service': 'rez-payment-links-service/openapi.yaml',
      'rez-journey-service': 'rez-journey-service/openapi.yaml',
      'rez-automation-service': 'rez-automation-service/openapi.yaml',
      'rez-gdpr-service': 'rez-gdpr-service/openapi.yaml',
      'rez-validation-service': 'rez-validation-service/openapi.yaml',
      'rez-cohort-service': 'rez-cohort-service/openapi.yaml',
      'rez-currency-service': 'rez-currency-service/openapi.yaml',
      'rez-invoice-service': 'rez-invoice-service/openapi.yaml',
      'rez-menu-service': 'rez-menu-service/openapi.yaml',
      'rez-refund-service': 'rez-refund-service/openapi.yaml',
      'rez-tracking-service': 'rez-tracking-service/openapi.yaml',
      'rez-marketing': 'rez-marketing/openapi.yaml',
      'rez-auth-service': 'rez-auth-service/openapi.yaml'
    };

    let currentSwaggerUi = null;

    function initSwaggerUI(specUrl) {
      document.getElementById('loadingOverlay').classList.remove('hidden');

      if (currentSwaggerUi) {
        currentSwaggerUi.dispose();
      }

      currentSwaggerUi = SwaggerUIBundle({
        url: specUrl,
        dom_id: '#swagger-ui',
        deepLinking: true,
        showExtensions: true,
        showInternals: true,
        supportedSubmitMethods: ['get', 'post', 'put', 'patch', 'delete'],
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: 'StandaloneLayout',
        docExpansion: 'list',
        filter: true,
        tryItOutEnabled: true,
        onComplete: function() {
          document.getElementById('loadingOverlay').classList.add('hidden');
        },
        onError: function() {
          document.getElementById('loadingOverlay').classList.add('hidden');
        }
      });

      window.swaggerUi = currentSwaggerUi;
    }

    document.querySelectorAll('.service-nav button').forEach(button => {
      button.addEventListener('click', function() {
        document.querySelectorAll('.service-nav button').forEach(btn => btn.classList.remove('active'));
        this.classList.add('active');
        initSwaggerUI(services[this.dataset.service]);
      });
    });

    initSwaggerUI(services['combined']);
  </script>
</body>
</html>
