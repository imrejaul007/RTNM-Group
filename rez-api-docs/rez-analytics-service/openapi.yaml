openapi: 3.0.3
info:
  title: ReZ Analytics Service API
  description: |
    A comprehensive real-time analytics and business intelligence service providing dashboards,
    data aggregation, chart generation, and reporting capabilities for the ReZ ecosystem.

    ## Features
    - Real-time Dashboards: Pre-configured dashboard layouts with live data
    - Data Aggregation: Flexible aggregation by hour, day, week, month
    - Chart Generation: Multiple chart types (bar, line, pie, funnel, gauge)
    - Revenue Analytics: Track revenue, refunds, and trends
    - Order Metrics: Order counts, status distribution, fulfillment rates
    - Customer Analytics: Cohort analysis, growth tracking, lifetime value
    - Merchant Performance: Top merchants, ratings, fulfillment metrics
    - Product Analytics: Top products, category performance
    - Conversion Funnels: Visitor to purchase conversion tracking
    - Scheduled Reports: Automated report generation and export
  version: 1.0.0
  contact:
    name: ReZ API Support
    email: api-support@rez.money
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3007
    description: Development server
  - url: https://api.rez.money/analytics
    description: Production server

tags:
  - name: Health
    description: Service health endpoints
  - name: Dashboard
    description: Dashboard data endpoints
  - name: Aggregation
    description: Data aggregation endpoints
  - name: Charts
    description: Chart data endpoints
  - name: KPIs
    description: Key Performance Indicators
  - name: Reports
    description: Report generation endpoints
  - name: Filters
    description: Filter options

paths:
  /health:
    get:
      tags:
        - Health
      summary: Service health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/dashboard:
    get:
      tags:
        - Dashboard
      summary: Get main dashboard data
      description: Returns aggregated data for the main analytics dashboard
      operationId: getDashboard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
        - $ref: '#/components/parameters/merchantId'
        - $ref: '#/components/parameters/category'
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'

  /api/dashboard/revenue:
    get:
      tags:
        - Dashboard
      summary: Revenue dashboard
      description: Returns revenue-specific dashboard data
      operationId: getRevenueDashboard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Revenue dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueDashboardResponse'

  /api/dashboard/orders:
    get:
      tags:
        - Dashboard
      summary: Orders dashboard
      description: Returns order-specific dashboard data
      operationId: getOrdersDashboard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Orders dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersDashboardResponse'

  /api/dashboard/customers:
    get:
      tags:
        - Dashboard
      summary: Customers dashboard
      description: Returns customer-specific dashboard data
      operationId: getCustomersDashboard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
      responses:
        '200':
          description: Customers dashboard data
          content:
            application/json:
              schema:
