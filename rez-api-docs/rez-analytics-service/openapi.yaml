  /api/charts/comparison:
    get:
      tags:
        - Charts
      summary: Period comparison
      description: Returns comparison data between two time periods
      operationId: getComparisonChart
      security:
        - bearerAuth: []
      parameters:
        - name: compareStartDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: compareEndDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
      responses:
        '200':
          description: Comparison chart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonChartResponse'

  /api/charts/conversion-funnel:
    get:
      tags:
        - Charts
      summary: Conversion funnel
      description: Returns funnel chart data for conversion tracking
      operationId: getConversionFunnel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Conversion funnel data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunnelChartResponse'

  /api/charts/all:
    get:
      tags:
        - Charts
      summary: Get all charts
      description: Returns data for all available charts
      operationId: getAllCharts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: All charts data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllChartsResponse'

  /api/kpis:
    get:
      tags:
        - KPIs
      summary: Get all KPIs
      description: Returns all key performance indicators
      operationId: getKPIs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: KPIs data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPIResponse'

  /api/kpis/summary:
    get:
      tags:
        - KPIs
      summary: Get KPI summary
      description: Returns a summary of key metrics
      operationId: getKPISummary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
      responses:
        '200':
          description: KPI summary data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPISummaryResponse'

  /api/kpis/trends:
    get:
      tags:
        - KPIs
      summary: Get KPI trends
      description: Returns historical KPI trend data
      operationId: getKPITrends
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
      responses:
        '200':
          description: KPI trends data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPITrendsResponse'

  /api/reports/executive-summary:
    get:
      tags:
        - Reports
      summary: Executive summary report
      description: Returns an executive summary report
      operationId: getExecutiveSummaryReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Executive summary report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveSummaryResponse'

  /api/reports/revenue:
    get:
      tags:
        - Reports
      summary: Revenue report
      description: Returns a detailed revenue report
      operationId: getRevenueReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/merchantId'
        - $ref: '#/components/parameters/category'
      responses:
        '200':
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueReportResponse'

  /api/reports/customers:
    get:
      tags:
        - Reports
      summary: Customer report
      description: Returns a detailed customer report
      operationId: getCustomerReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
      responses:
        '200':
          description: Customer report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerReportResponse'

  /api/reports/merchants:
    get:
      tags:
        - Reports
      summary: Merchant report
      description: Returns a detailed merchant report
      operationId: getMerchantReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
      responses:
        '200':
          description: Merchant report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantReportResponse'

  /api/reports/export/{format}:
    get:
      tags:
        - Reports
      summary: Export report
      description: Exports a report in the specified format
      operationId: exportReport
      security:
        - bearerAuth: []
      parameters:
        - name: format
          in: path
          required: true
          description: Export format
          schema:
            type: string
            enum:
              - pdf
              - csv
              - xlsx
        - name: type
          in: query
          required: true
          description: Report type
          schema:
            type: string
            enum:
              - revenue
              - orders
              - customers
              - merchants
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Exported report file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResponse'

  /api/filters/date-range:
    get:
      tags:
        - Filters
      summary: Get date range options
      description: Returns available date range filter options
      operationId: getDateRangeFilters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Date range options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DateRangeFiltersResponse'

  /api/filters/merchants:
    get:
      tags:
        - Filters
      summary: Get merchant filter options
      description: Returns available merchant filter options
      operationId: getMerchantFilters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Merchant filter options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantFiltersResponse'

  /api/filters/categories:
    get:
      tags:
        - Filters
      summary: Get category filter options
      description: Returns available category filter options
      operationId: getCategoryFilters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Category filter options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryFiltersResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    startDate:
      name: startDate
      in: query
      description: Start of date range (ISO 8601)
      schema:
        type: string
        format: date-time
    endDate:
      name: endDate
      in: query
      description: End of date range (ISO 8601)
      schema:
        type: string
        format: date-time
    period:
      name: period
      in: query
      description: Aggregation period
      schema:
        type: string
        enum:
          - hourly
          - daily
          - weekly
          - monthly
        default: daily
    merchantId:
      name: merchantId
      in: query
      description: Filter by merchant ID
      schema:
        type: string
    category:
      name: category
      in: query
      description: Filter by category
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 10
        maximum: 100

  schemas:
    ChartDataset:
      type: object
      properties:
        label:
          type: string
        data:
          type: array
          items:
            type: number
        backgroundColor:
          type: string
        borderColor:
          type: string
        fill:
          type: boolean

    ChartResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
            datasets:
              type: array
              items:
                $ref: '#/components/schemas/ChartDataset'
        meta:
          type: object
          properties:
            generatedAt:
              type: string
              format: date-time
            period:
              type: string
            dateRange:
              type: object
              properties:
                start:
                  type: string
                  format: date
                end:
                  type: string
                  format: date

    PieChartResponse:
      allOf:
        - $ref: '#/components/schemas/ChartResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                labels:
                  type: array
                  items:
                    type: string
                datasets:
                  type: array
                  items:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: number
                      backgroundColor:
                        type: array
                        items:
                          type: string

    FunnelChartResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            steps:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  count:
                    type: integer
                  percentage:
                    type: number
        meta:
          $ref: '#/components/schemas/ChartResponse/properties/meta'

    ComparisonChartResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            currentPeriod:
              type: object
              properties:
                labels:
                  type: array
                  items:
                    type: string
                datasets:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChartDataset'
            previousPeriod:
              type: object
              properties:
                labels:
                  type: array
                  items:
                    type: string
                datasets:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChartDataset'
            changes:
              type: object
              additionalProperties:
                type: number
        meta:
          $ref: '#/components/schemas/ChartResponse/properties/meta'

    AllChartsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            revenueBar:
              $ref: '#/components/schemas/ChartResponse/properties/data'
            orderLine:
              $ref: '#/components/schemas/ChartResponse/properties/data'
            orderStatusPie:
              $ref: '#/components/schemas/PieChartResponse/properties/data'
            revenueCategory:
              $ref: '#/components/schemas/PieChartResponse/properties/data'
            merchantPerformance:
              $ref: '#/components/schemas/ChartResponse/properties/data'
            customerGrowth:
              $ref: '#/components/schemas/ChartResponse/properties/data'
            topProducts:
              $ref: '#/components/schemas/ChartResponse/properties/data'

    AggregationResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            data:
              type: object
              properties:
                revenue:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      revenue:
                        type: number
                      orders:
                        type: integer
                      averageOrderValue:
                        type: number
                total:
                  type: number
            computedAt:
              type: string
              format: date-time

    OrderAggregationResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            orders:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  total:
                    type: integer
                  completed:
                    type: integer
                  cancelled:
                    type: integer
                  pending:
                    type: integer
            totals:
              type: object
              properties:
                total:
                  type: integer
                completed:
                  type: integer
                cancelled:
                  type: integer
                pending:
                  type: integer

    CohortAggregationResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
