        - $ref: '#/components/parameters/period'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Order aggregation data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderAggregationResponse'

  /api/aggregation/customers:
    get:
      tags:
        - Aggregation
      summary: Get customer cohort data
      description: Returns customer cohort analysis data
      operationId: getCustomerCohortData
      security:
