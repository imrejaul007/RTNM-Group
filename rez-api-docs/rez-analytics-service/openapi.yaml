  /api/dashboard/merchants:
    get:
      tags:
        - Dashboard
      summary: Merchants dashboard
      description: Returns merchant-specific dashboard data
      operationId: getMerchantsDashboard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
      responses:
        '200':
          description: Merchants dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantsDashboardResponse'

  /api/aggregation/revenue:
    get:
      tags:
        - Aggregation
      summary: Get revenue aggregation
      description: Returns aggregated revenue data
      operationId: getRevenueAggregation
      security:
        - bearerAuth: []
      parameters:
