  /api/charts/order-status-pie:
    get:
      tags:
        - Charts
      summary: Order status pie chart
      description: Returns pie chart data for order status distribution
      operationId: getOrderStatusPieChart
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/merchantId'
      responses:
