  /api/aggregation/refresh:
    post:
      tags:
        - Aggregation
      summary: Force refresh aggregation
      description: Forces a refresh of the aggregation cache
      operationId: refreshAggregation
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshAggregationRequest'
      responses:
        '200':
          description: Aggregation refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAggregationResponse'

  /api/aggregation/status:
    get:
      tags:
        - Aggregation
      summary: Get last aggregation time
      description: Returns the timestamp of the last aggregation run
      operationId: getAggregationStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Aggregation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregationStatusResponse'

  /api/charts/revenue-bar:
    get:
      tags:
        - Charts
      summary: Revenue bar chart
      description: Returns bar chart data for revenue over time
      operationId: getRevenueBarChart
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
        - $ref: '#/components/parameters/merchantId'
      responses:
        '200':
          description: Revenue bar chart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartResponse'

  /api/charts/order-line:
    get:
      tags:
        - Charts
      summary: Order trend line chart
      description: Returns line chart data for order trends
      operationId: getOrderLineChart
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/period'
