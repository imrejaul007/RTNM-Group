# RTNM-Group Kubernetes Deployment
# Production-grade Kubernetes manifests

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: rtnm-group
  labels:
    name: rtnm-group
    environment: production

---
# ConfigMap - Identity Service
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  namespace: rtnm-group
data:
  NODE_ENV: "production"
  PORT: "3003"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://rez.money,https://admin.rez.money"

---
# ConfigMap - Shared
apiVersion: v1
kind: ConfigMap
metadata:
  name: rtnm-shared-config
  namespace: rtnm-group
data:
  MONGODB_DATABASE: "rez_identity_service"
  REDIS_DATABASE: "0"

---
# Secret - Identity Service
apiVersion: v1
kind: Secret
metadata:
  name: identity-service-secret
  namespace: rtnm-group
type: Opaque
stringData:
  MONGODB_URI: "mongodb://user:password@mongo:27017/rez_identity_service?authSource=admin"
  REDIS_URL: "redis://:password@redis:6379"
  IDENTITY_SALT: "CHANGE_ME"
  INTERNAL_SERVICE_TOKENS_JSON: '{"admin-panel":"CHANGE_ME"}'

---
# Service - Identity Service
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: rtnm-group
  labels:
    app: identity-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: identity-service
  ports:
    - name: http
      protocol: TCP
      port: 3003
      targetPort: 3003
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Deployment - Identity Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: rtnm-group
  labels:
    app: identity-service
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: identity-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: identity-service
          image: rtnm/identity-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: identity-service-config
            - configMapRef:
                name: rtnm-shared-config
            - secretRef:
                name: identity-service-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: identity-service

---
# HorizontalPodAutoscaler - Identity Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service-hpa
  namespace: rtnm-group
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-service-pdb
  namespace: rtnm-group
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: identity-service

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-service
  namespace: rtnm-group

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: identity-service-network-policy
  namespace: rtnm-group
spec:
  podSelector:
    matchLabels:
      app: identity-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: access-control
      ports:
        - protocol: TCP
          port: 3003
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
