# RTNM-Group Render Deployment Configuration
# https://render.com/docs/deploys

# ============================================
# Identity Service
# ============================================
identity-service:
  type: web
  region: singapore
  plan: starter
  dockerfilePath: ./Dockerfile
  dockerCommand: node dist/index.js
  dockerTarget: production-identity
  envVars:
    - key: NODE_ENV
      value: production
    - key: PORT
      value: 3003
    - key: MONGODB_URI
      sync: false
    - key: REDIS_URL
      sync: false
    - key: IDENTITY_SALT
      sync: false
    - key: INTERNAL_SERVICE_TOKENS_JSON
      sync: false
    - key: CORS_ORIGIN
      value: "https://rez.money,https://admin.rez.money"
    - key: LOG_LEVEL
      value: info

