apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexha-{SERVICE}
  namespace: nexha
  labels:
    app: nexha-{SERVICE}
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexha-{SERVICE}
  template:
    metadata:
      labels:
        app: nexha-{SERVICE}
        tier: backend
    spec:
      containers:
      - name: nexha-{SERVICE}
        image: nexha/{SERVICE}:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: nexha-config
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: MONGODB_URI
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: INTERNAL_SERVICE_TOKEN
        - name: AUTH_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: AUTH_SERVICE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexha-{SERVICE}
  namespace: nexha
spec:
  selector:
    app: nexha-{SERVICE}
  ports:
  - port: 80
    targetPort: 4000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexha-{SERVICE}-hpa
  namespace: nexha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexha-{SERVICE}
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
